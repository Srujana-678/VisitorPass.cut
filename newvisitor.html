<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Visitor</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="container">
    <div class="form-container">
        <h1>New Visitor Entry</h1>
        <form id="visitorForm">
            <label>Visitor Name *</label>
            <input type="text" id="visitorName" placeholder="Enter Visitor Name" required>

            <label>Mobile Number *</label>
            <input type="tel" id="mobile" placeholder="Enter Mobile Number" required>

            <label>Company / Organization</label>
            <input type="text" id="company" placeholder="Enter Company Name">

            <label>Verified By</label>
            <select id="verifiedBy">
                <option value="">Select Authority</option>
                <option>Srujana</option>
                <option>Sidharth</option>
                <option>Naveen Reddy</option>
            </select>

            <label>Purpose Of Visit *</label>
            <textarea id="purpose" placeholder="Enter Purpose"></textarea>

            <div class="row">

                <div class="column">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>

                <div class="column">
                    <label>Time In</label>
                    <input type="time" id="time">
                </div>

            </div>

            <button type="submit" class="saveBtn">
                Save Visitor
            </button>
        </form>
    </div>
</div>
<script>
const today = new Date();
document.getElementById("date").value =
today.toISOString().split("T")[0];
const hours = String(today.getHours()).padStart(2,'0');
const minutes = String(today.getMinutes()).padStart(2,'0');
document.getElementById("time").value =
hours + ":" + minutes;
document.getElementById("visitorForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const visitor = {

        visitorName: document.getElementById("visitorName").value,
        mobile: document.getElementById("mobile").value,
        company: document.getElementById("company").value,
        verifiedBy: document.getElementById("verifiedBy").value,
        purpose: document.getElementById("purpose").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value

    };

    try{

        const response = await fetch("http://localhost:5000/saveVisitor",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify(visitor)
        });
        const result = await response.json();
        if(result.success){
            alert("Visitor Saved Successfully");
            document.getElementById("visitorForm").reset();
        }else{
            alert(result.message);
        }
    }catch(error){
        console.error(error);
        alert("Server Connection Failed");
    }
});
</script>
</body>
</html>
